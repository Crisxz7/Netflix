<!DOCTYPE html>
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Gerenciar perfis</title>
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 
    <div class="manage-container">
        <header class="manage-header"> 
            <h1>Gerenciar perfis</h1> 
            <button type="button" class="back-button" id="back-home">Voltar</button>
        </header> 

        <p>Altere o nome e a foto de cada perfil. As mudanças são salvas automaticamente.</p>

        <!-- Os cards de perfil editáveis são gerados dinamicamente pelo gerenciar.js -->
        <section class="profile-cards" id="manage-list"></section>

        <!-- Exibe mensagens de feedback ao usuário, como "Nome atualizado!" -->
        <p class="status-message" id="status-message"></p>
    </div>

    <script src="theme.js"></script>
    <script src="js/gerenciar.js"></script>
</body>
</html>
