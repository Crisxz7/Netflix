<!DOCTYPE html> 
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body> 

    <!-- Intro com vídeo: ocupa toda a tela e some automaticamente após o vídeo terminar -->
    <div id="intro">
        <video id="videoIntro" autoplay muted playsinline>
            <source src="assents/intro-netflix.mp4" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
    </div>

    <header>
        <h1>Quem está assistindo?</h1>
        <!-- Botão fixo no canto superior direito para alternar entre tema claro e escuro -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo claro/escuro" title="Alternar tema">🌙</button>
    </header>

    <main>
        <section aria-label="Perfis disponíveis">
            <!-- data-profile-id: identifica qual perfil do localStorage será carregado ao clicar -->
            <ul class="profiles" aria-label="Lista de perfis">
                <li class="profile-item" data-profile-id="1">
                    <a href="catalogo/catalogo.html" aria-label="Perfil de Vanessa, clique para acessar">
                        <figure>
                            <img src="assents/perfil-1.jpg" alt="Uma mulher de cabelos longos e um vestido antigo.">
                            <figcaption>Vanessa</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile-item" data-profile-id="2">
                    <a href="catalogo/catalogo.html" aria-label="Perfil de Thiago, clique para acessar">
                        <figure>
                            <img src="assents/perfil-2.jpg" alt="Um homem de cabelos curtos e barba, com um terno elegante antigo.">
                            <figcaption>Thiago</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile-item" data-profile-id="3">
                    <a href="catalogo/catalogo.html" aria-label="Perfil de Ana, clique para acessar">
                        <figure>
                            <img src="assents/perfil-3.jpg" alt="Uma mulher de tranças e um vestido antigo.">
                            <figcaption>Ana</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile-item" data-profile-id="4">
                    <a href="catalogo/catalogo.html" aria-label="Perfil de Vitória, clique para acessar">
                        <figure>
                            <img src="assents/perfil-4.jpg" alt="Uma senhora de cabelos brancos e um vestido antigo.">
                            <figcaption>Vitória</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>

        <section class="gerenciar">
            <button type="button" class="botao-gerenciar" id="manage-profiles">Gerenciar perfis</button>
        </section>
    </main>

    <script src="theme.js"></script>
    <script src="js/index.js"></script>

</body> 
</html>
