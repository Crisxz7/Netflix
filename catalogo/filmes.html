<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes - Netflix Clone</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"
                alt="Netflix">
            <nav>
                <ul class="nav-links">
                    <li><a href="catalogo.html">Início</a></li>
                    <li><a href="series.html">Séries</a></li>
                    <li><a href="filmes.html" class="active">Filmes</a></li>
                    <li><a href="bombando.html">Bombando</a></li>
                    <li><a href="minha-lista.html">Minha lista</a></li>
                </ul>
            </nav>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Buscar filmes...">
                <i class="fas fa-search icon search-icon" id="search-icon"></i>
            </div>
            <a href="../index.html" class="kids-link">Seu nome</a>
            <div class="nav-notification">
                <i class="fas fa-bell icon" id="notification-bell"></i>
                <span class="notification-badge"></span>
            </div>
            <a href="../index.html" class="profile-menu" style="text-decoration: none; color: inherit;">
                <img class="profile-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
                    alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <!-- Page Title -->
    <main class="sliders-container" id="main-content">
        <div class="page-title">
            <h1>Filmes</h1>
            <p class="content-count">Mostrando <span id="film-count">0</span> filmes</p>
        </div>
        <div id="films-grid" class="content-grid"></div>
    </main>

    <!-- Notification Panel -->
    <div id="notification-panel" class="notification-panel">
        <div class="notification-panel-header">
            <h3>Atividades Recentes</h3>
            <button class="close-panel" id="close-panel">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="notification-panel-content" id="notification-list">
            <p class="no-notifications">Nenhuma atividade recente</p>
        </div>
    </div>

    <!-- Overlay -->
    <div id="notification-overlay" class="notification-overlay"></div>

    <script type="module" src="./js/filmes.js"></script>
</body>

</html>
